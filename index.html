
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Configurações PWA e Ícones -->
    <title>Felix e Castro Advocacia Especializada</title>
    <meta name="description" content="Sistema de acompanhamento processual da Felix e Castro Advocacia Especializada.">
    <meta name="theme-color" content="#2a0505" />
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">

    <!-- CSS do CropperJS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              bordo: {
                900: '#450a0a',
                950: '#2a0505',
              }
            },
            fontSize: {
              'base': '1.125rem', // 18px base for better readability
              'lg': '1.25rem',
              'xl': '1.5rem',
              '2xl': '1.875rem',
              '3xl': '2.25rem',
            },
            boxShadow: {
              'premium': '0 10px 40px -10px rgba(0,0,0,0.08)',
              'premium-hover': '0 20px 40px -10px rgba(0,0,0,0.12)',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        font-size: 18px; /* Base size increased for elderly users */
        line-height: 1.6;
        color: #1e293b; /* slate-800 for better contrast */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, .font-serif {
        font-family: 'Playfair Display', serif;
        letter-spacing: -0.02em;
      }
      
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.3s ease-out forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.93.2",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "compressorjs": "https://esm.sh/compressorjs@1.2.1",
    "cropperjs": "https://esm.sh/cropperjs@1.6.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <!-- Script de Entrada Obrigatório para o React/Vite iniciar -->
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
